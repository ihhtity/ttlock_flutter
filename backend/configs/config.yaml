server:
  port: 8080
  mode: debug  # debug, release, test

database:
  master_dsn: "root:123456@tcp(localhost:3306)/device_flutter?charset=utf8mb4&parseTime=True&loc=Local"
  slave_dsns:
    - "root:123456@tcp(localhost:3306)/device_flutter?charset=utf8mb4&parseTime=True&loc=Local"
  max_open_conns: 100
  max_idle_conns: 20
  conn_max_lifetime: 3600  # seconds
  conn_max_idle_time: 600  # seconds

redis:
  enabled: true
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  pool_size: 100

cache:
  local_ttl: 30      # seconds
  redis_ttl: 300     # seconds
  warmup_enabled: true

jwt:
  secret: "ttlock-secret-key-2026"
  expire_hours: 24

log:
  level: info  # debug, info, warn, error
  format: json  # json, console
  output: stdout  # stdout, file
  file_path: "./logs/app.log"

cors:
  allowed_origins:
    - "*"
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed_headers:
    - Content-Type
    - Authorization
  allow_credentials: true

rate_limit:
  enabled: true
  requests_per_second: 100
  burst_size: 200

# SMS Configuration (Aliyun)
sms:
  enabled: false  # Set to true when you have Aliyun SMS credentials
  access_key_id: "your-access-key-id"
  access_key_secret: "your-access-key-secret"
  sign_name: "宝士力得"
  template_code: "SMS_123456789"  # Replace with your template code
  region_id: "cn-hangzhou"

# Email Configuration (SMTP)
email:
  enabled: true
  host: "smtp.qq.com"  # SMTP server host
  port: 465  # SMTP server port (587 for TLS, 465 for SSL)
  username: "foxsummer@bsldtech.com"  # Your email address
  password: "pwikcgtulpcyichc"  # SMTP authorization code
  from_name: "宝士力得"
  use_tls: true  # 端口 465 使用 SSL，需要设置为 true
